<div class="car-list">
  <h2>Select car model</h2>
  <div *ngFor="let car of carList" class="car-item">
  <div class="car-image">
  <img [src]="car.car_image" alt="{{ car.car_name }}">
  </div>
  <div class="car-details">
  <h2>{{ car.car_name }}</h2>
  <p>{{ car.description }}</p>
  <div class="time-slots">
  <strong>Available Test Drive Slots:</strong>
  <ul>
  <li *ngFor="let slot of car.time_slots">{{ slot }}</li>
  </ul>
  </div>
  </div>
  </div>
  </div>
