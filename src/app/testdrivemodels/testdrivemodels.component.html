

   <div class="car-models-container">
    <h1>Select Car Model</h1>
   
    <!-- Container for car cards -->
    <div class="car-models-list">
      <div *ngFor="let car of model" class="car-card">
        <!-- Car image -->
        <div class="car-image">
          <img [src]="car.car_image" alt="{{ car.car_name }}">
        </div>
   
        <!-- Car details -->
        <div class="car-details">
          <h2>{{ car.car_name }}</h2>
          <p>{{ car.description }}</p>
   
          <!-- Date Picker -->
          <div class="date">
            <strong>Date:</strong>
            <input type="date" [(ngModel)]="car.selectedDate" (change)="dateChange(car.selectedDate)"/>
          </div>
   
          <!-- Available Test Drive Slots -->
          <div class="time-slots">
            <strong>Available Test Drive Slots:</strong>
            <select [(ngModel)]="car.selectedTime" (change)="timeChange(car.selectedTime)">
              <option *ngFor="let slot of car.slots" [value]="slot">{{ slot }}</option>
            </select>
          </div>
   
          <button class="book-btn" [disabled]="!car.selectedDate || !car.selectedTime" (click)="submitted(car.test_drive_id)">Book Test Drive</button>
        </div>
      </div>
    </div>
  </div>
